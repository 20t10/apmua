auth_enabled: false
server:
  http_listen_port: 3100
ingester:
  wal:
      dir: /loki/wal  # เพิ่มตรงนี้
  lifecycler:
    address: 127.0.0.1
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    final_sleep: 0s
schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        path_prefix: loki/index/
        period: 24h
storage_config:
  tsdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/index/cache  # ต้องมีด้วย
  filesystem:
    directory: /loki/chunks
compactor:
  working_directory: /loki/compactor
  delete_request_store: filesystem  # เพิ่มบรรทัดนี้
  retention_enabled: true
  retention_delete_delay: 2h
ruler:
  alertmanager_url: http://localhost:9093
limits_config:
  retention_period: 336h

  reject_old_samples: true
  reject_old_samples_max_age: 168h